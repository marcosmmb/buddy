name: Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - pyproject.toml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  detect-version:
    name: Detect version change
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read project version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          with Path("pyproject.toml").open("rb") as file:
              print(tomllib.load(file)["project"]["version"])
          PY
          )"
          tag="v${version}"

          changed="true"
          if [[ "${{ github.event_name }}" == "push" ]]; then
            before="${{ github.event.before }}"
            if [[ -n "${before}" && "${before}" != "0000000000000000000000000000000000000000" ]] && git cat-file -e "${before}:pyproject.toml" 2>/dev/null; then
              previous_version="$(git show "${before}:pyproject.toml" | python -c 'import sys, tomllib; print(tomllib.loads(sys.stdin.read())["project"]["version"])')"
              if [[ "${previous_version}" == "${version}" ]]; then
                changed="false"
              fi
            fi
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "changed=${changed}" >> "${GITHUB_OUTPUT}"
          echo "Detected version ${version}; changed=${changed}"

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: detect-version
    if: needs.detect-version.outputs.changed == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.detect-version.outputs.tag }}
          VERSION: ${{ needs.detect-version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "Release ${TAG} already exists."
            exit 0
          fi

          gh release create "${TAG}" \
            --target "${GITHUB_SHA}" \
            --title "Buddy ${VERSION}" \
            --generate-notes

  docker:
    name: Build and publish image
    runs-on: ubuntu-latest
    needs:
      - detect-version
      - release
    if: needs.detect-version.outputs.changed == 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Resolve image name
        id: image
        shell: bash
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ needs.detect-version.outputs.version }}
            type=raw,value=${{ needs.detect-version.outputs.tag }}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ needs.detect-version.outputs.version }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
